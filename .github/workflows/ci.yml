name: Java CI

on:
  push:
    branches:
      - "main"
      - "develop"
  pull_request:
    branches:
      - "main"
      - "develop"
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run TestNG Selenium suite"
        required: false
        default: false
        type: boolean
      test_env:
        description: "Target environment for suite"
        required: false
        default: dev
        type: choice
        options:
          - dev
          - sit
          - uat

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile
        run: mvn -B -ntp -DskipTests compile test-compile

  sonar:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B -ntp -DskipTests verify sonar:sonar \
            -Dsonar.projectKey=alokbarmanus \
            -Dsonar.organization=alokbarmanus \
            -Dsonar.host.url=https://sonarcloud.io

  test:
    if: github.event_name == 'pull_request' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_tests == true)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Start Selenium Grid with video recording
        run: |
          mkdir -p ${{ github.workspace }}/videos
          docker network create grid

          docker run -d --name selenium-chrome \
            --network grid \
            --shm-size=2g \
            -p 4444:4444 \
            -e SE_VNC_NO_PASSWORD=1 \
            selenium/standalone-chrome:latest

          docker run -d --name selenium-video \
            --network grid \
            -e DISPLAY_CONTAINER_NAME=selenium-chrome \
            -e SE_VIDEO_FILE_NAME=test-recording.mp4 \
            -v ${{ github.workspace }}/videos:/videos \
            selenium/video:latest

          echo "Waiting for Selenium Grid to be ready..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s http://localhost:4444/wd/hub/status | grep -c '"ready": true' || true)
            if [ "$STATUS" -gt "0" ]; then
              echo "Selenium Grid is ready."
              break
            fi
            echo "Attempt $i: Grid not ready yet, waiting 5s..."
            sleep 5
          done

      - name: Run TestNG suite on Selenium Grid
        run: mvn -B -ntp test -Denv=${{ github.event_name == 'workflow_dispatch' && inputs.test_env || 'dev' }} -Dgrid.url=http://localhost:4444

      - name: Stop video recording
        if: always()
        run: |
          docker stop selenium-video || true
          docker stop selenium-chrome || true
          docker network rm grid || true

      - name: Upload test reports and videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ github.event_name == 'workflow_dispatch' && inputs.test_env || 'dev' }}
          path: |
            target/surefire-reports
            target/extent-reports
            target/cucumber-reports
            test-output
            videos/
