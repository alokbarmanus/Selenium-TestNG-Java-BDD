name: Java CI

on:
  push:
    branches:
      - "main"
      - "develop"
  pull_request:
    branches:
      - "main"
      - "develop"
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run TestNG Selenium suite"
        required: false
        default: false
        type: boolean
      test_env:
        description: "Target environment for suite"
        required: false
        default: dev
        type: choice
        options:
          - dev
          - sit
          - uat

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile
        run: mvn -B -ntp -DskipTests compile test-compile

  test:
    if: github.event_name == 'pull_request' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_tests == true)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run TestNG suite
        run: mvn -B -ntp test -Denv=${{ github.event_name == 'workflow_dispatch' && inputs.test_env || 'dev' }} -Dheadless=true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ github.event_name == 'workflow_dispatch' && inputs.test_env || 'dev' }}
          path: |
            target/surefire-reports
            target/extent-reports
            target/cucumber-reports
            test-output
